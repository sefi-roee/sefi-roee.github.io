<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evony Card Compose Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-3 app-container">
        <h1 class="mb-3 text-center app-title">Evony Card Compose Optimizer</h1>
        <div id="progress-bar-container" style="display:none;">
            <div class="progress mb-3">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
            </div>
        </div>
        <div id="main-flex" class="optimizer-layout">
            <div id="card-col" class="layout-panel"></div>
            <div id="recipe-col" class="layout-panel"></div>
            <div id="result-col" class="layout-panel"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/javascript-lp-solver/src/solver.js"></script>
    <script src="app.js"></script>
</body>
</html>
