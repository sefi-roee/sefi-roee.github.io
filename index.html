<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sefi Roee - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #7e57c2 100%);
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .hero {
            text-align: center;
            color: white;
            max-width: 600px;
        }
        .profile-photo {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            border: 8px solid white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            margin: 0 auto 2.5rem;
            object-fit: cover;
            background: #f0f0f0;
        }
        .social-links {
            display: flex;
            gap: 2rem;
            justify-content: center;
            margin-top: 2rem;
        }
        .social-links a {
            color: white;
            font-size: 2.5rem;
            transition: all 0.3s ease;
            opacity: 0.9;
            text-decoration: none;
        }
        .social-links a:hover {
            transform: scale(1.1) translateY(-5px);
            opacity: 1;
        }
        .tools-link {
            margin-top: 2rem;
        }
        .tools-link a {
            display: inline-block;
            color: white;
            text-decoration: none;
            border: 1px solid rgba(255, 255, 255, 0.85);
            border-radius: 999px;
            padding: 0.6rem 1.2rem;
            font-weight: 600;
            transition: background 0.25s ease, color 0.25s ease;
        }
        .tools-link a:hover {
            background: white;
            color: #1e3c72;
        }
        footer {
            position: absolute;
            bottom: 2rem;
            text-align: center;
            color: white;
            opacity: 0.7;
            width: 100%;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://media.licdn.com/dms/image/v2/D4D03AQGvnulFlHC4uw/profile-displayphoto-shrink_400_400/profile-displayphoto-shrink_400_400/0/1666498544827?e=1774483200&v=beta&t=c1CmUJbCNst6jk5ljCiYcUPZDFGZ5v6VdedaknNmPmQ" alt="Sefi Roee" class="profile-photo" id="profilePhoto">
        
        <div class="social-links">
            <a href="https://github.com/sefi-roee" target="_blank" title="GitHub">
                <i class="bi bi-github"></i>
            </a>
            <a href="https://linkedin.com/in/sefi-roee" target="_blank" title="LinkedIn">
                <i class="bi bi-linkedin"></i>
            </a>
            <a href="mailto:roee.sefi@gmail.com" title="Email">
                <i class="bi bi-envelope-fill"></i>
            </a>
        </div>

        <div class="tools-link">
            <a href="evony/">Open Evony Tools</a>
        </div>
    </div>

    <footer>
        <p>© 2026 Sefi Roee</p>
    </footer>
</body>
</html>
