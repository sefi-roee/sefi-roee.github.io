<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evony Card Compose Optimizer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container py-2">
        <h1 class="mb-3 text-center">Evony Card Compose Optimizer</h1>
        <div id="progress-bar-container" style="display:none;">
            <div class="progress mb-3">
                <div id="progress-bar" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%">0%</div>
            </div>
        </div>
        <div id="main-flex" style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; align-items: flex-start;">
            <div id="card-col" style="flex: 1 1 220px; min-width: 200px; max-width: 260px;"></div>
            <div id="recipe-col" style="flex: 2 1 340px; min-width: 260px; max-width: 420px;"></div>
            <div id="result-col" style="flex: 2 1 340px; min-width: 260px; max-width: 420px;"></div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/javascript-lp-solver/src/solver.js"></script>
    <script src="app.js"></script>
</body>
</html>
